services:
  api:
    build:
      context: .
      dockerfile: CarFactoryAPI/Dockerfile
    container_name: carfactory-api
    environment:
      ASPNETCORE_HTTP_PORTS: 8080
      Database__ConnectionString: Host=host.docker.internal;Port=5432;Database=carfactory;Username=carfactory;Password=carfactory_dev_password
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5019:8080"
